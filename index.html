<html>
<head>
<style>
body{
background:#ff9aa2;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
color:white;
font-size:35px;
margin-bottom:30px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
position:relative;
}

#yes{
background:green;
color:white;
margin-right:20px;
}

#no{
background:red;
color:white;
position:absolute;
}

.heart{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1 id="text">Will you be my best friend forever?</h1>

<div>
<button id="yes" onclick="love()">YES</button>
<button id="no" onmouseover="move()">NO</button>
</div>

<script>
function move(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;
let btn=document.getElementById("no");
btn.style.left=x+"px";
btn.style.top=y+"px";
}

function love(){
document.getElementById("text").innerHTML="Yay! Best friends forever 💙";

for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);
}
}
</script>

</body>
</html>
